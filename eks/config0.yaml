global:
  arguments:
    aws_default_region: eu-west-1

# network_vars matches the VPC resource record (it alone carries labels_region);
# vpc_name/vpc_id/public_subnet_ids/private_subnet_ids are terraform outputs there.
network_vars:
  match:
    labels:
      environment: dev
      purpose: eval-config0
      area: network
      region: eu-west-1
      cloud: aws

# sg_vars matches the security_group record — bastion_sg_id is a terraform output
# on that record, not on the VPC record, so it needs a resource_type-keyed selector.
sg_vars:
  match:
    filter:
      resource_type: security_group
    labels:
      environment: dev
      purpose: eval-config0
      area: network
      cloud: aws

eks_info:
  match:
    filter:
      resource_type: eks
    labels:
      environment: dev
      purpose: eval-config0

stacks:
  eks:
    stack: config0-hub:::aws_eks::aws_eks
    arguments:
      vpc_name: selector:::network_vars::vpc_name
      vpc_id: selector:::network_vars::vpc_id
      eks_cluster: eval-config0-eks
      eks_cluster_version: "1.29"
      eks_cluster_subnet_ids: selector:::network_vars::public_subnet_ids:csv
      eks_cluster_sg_id: selector:::sg_vars::bastion_sg_id
      eks_node_group_subnet_ids: selector:::network_vars::private_subnet_ids:csv
      eks_node_role_arn: selector:::eks_info::node_role_arn
      eks_node_capacity_type: ON_DEMAND
      eks_node_ami_type: AL2_x86_64
      eks_node_max_capacity: 1
      eks_node_min_capacity: 1
      eks_node_desired_capacity: 1
      eks_node_disksize: 25
      eks_node_instance_types:
        - t3.medium
        - t3.large
    selectors:
      - network_vars
      - sg_vars
      - eks_info
    connections:
      - reference: dev1
