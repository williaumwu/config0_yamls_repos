global:
  arguments:
    aws_default_region: eu-west-1

# env_sql is SELF-CONTAINED: its `network` substack builds sql-vpc + subnets +
# route tables + security groups (and a network_vars_set + NAT), then its rds_eks
# substack builds the RDS + EKS. So the config0.yaml carries only business arguments;
# the wiring from the created network into RDS/EKS is the two selectors below, which
# query env_sql's OWN resources within the same run. The `purpose: config0` label
# namespaces those resources apart from story 2's `eval-config0` VPC.
#
# Ordering implication: on a fresh run sql-vpc does not exist when env_sql's order is
# minted, so both selectors skip-and-leave-original at the Python mint pass and resolve
# at the Go dispatch pass — which lands after the `network` substack has created and
# written back sql-vpc (env_sql inserts network before rds_eks, sequentially). Live
# resolution also depends on the flat labels_<name> write-back (see story-stack-facts
# "Open findings" #1); until that lands these match zero regardless of fixture shape.
labels:
  general:
    environment: dev
    purpose: config0

# The single VPC record env_sql's network substack creates. vpc_simple promotes every
# terraform output onto it, so vpc_id / subnet id CSVs / the private route table id all
# read off this one record — there are NO separate subnet/route_table resource records.
vpc_info:
  match:
    filter:
      resource_type: vpc
    labels:
      environment: dev
      purpose: config0

# The single security_group record (aws_sg emits one record with all four *_sg_id
# outputs — bastion/web/api/db — not one record per tier).
sg_vars:
  match:
    filter:
      resource_type: security_group
    labels:
      environment: dev
      purpose: config0

stacks:
  env_3tier:
    stack: config0-hub:::devops-solutions::env_sql
    arguments:
      env_name: sql
      aws_default_region: eu-west-1
      vpc_id: selector:::vpc_info::vpc_id
      public_subnet_ids: selector:::vpc_info::public_subnet_ids:csv
      private_subnet_ids: selector:::vpc_info::private_subnet_ids:csv
      private_route_table_id: selector:::vpc_info::private_route_table_id
      db_sg_id: selector:::sg_vars::db_sg_id
      eks_cluster_sg_id: selector:::sg_vars::bastion_sg_id
      db_engine: MySQL
      db_engine_version: 5.7.44
      db_allocated_storage: 14
      db_instance_class: db.t3.micro
      cloud_tags_hash:
        environment: dev
        purpose: config0
    selectors:
      - vpc_info
      - sg_vars
    connections:
      - reference: dev1
